<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静静，我想你啦 ❤️</title>
    <style>
        body {主体 {
            margin: 0;
            background: #fff0f5;背景: #fff0f5;
            overflow: hidden;溢出: 隐藏;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .heart {        .心 {
            position: absolute;
            width: 20px;宽度: 20像素;
            height: 20px;
            background: #ff69b4;
            transform: rotate(-45deg);变换: 旋转(-45度);
            animation: fall 3s linear infinite;
        }
        .heart::before, .heart::after {
            content: '';
            position: absolute;
            width: 20px;宽度: 20像素;
            height: 20px;高度: 20像素;
            background: #ff69b4;背景: #ff69b4;
            border-radius: 50%;
        }
        .heart::before { top: -10px; }
        .heart::after { left: -10px; }
        @keyframes fall {
            0% { transform: rotate(-45deg) translateY(-20px); opacity: 1; }
            100% { transform: rotate(-45deg) translateY(100vh); opacity: 0; }
        }
        .popup {
            position: absolute;
            width: 220px;
            height: 80px;
            background: pink;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            animation: fadeIn 0.3s;
            z-index: 10;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff69b4;
        }
    </style>
</head>
<body>
    <div class="title">✨ 静静，我想你啦 ✨</div>
    <script>
        function createHeart创建心形() {
            const h = document.createElement创建元素('div'‘div’);
            h.className = 'heart';
            h.style.left = Math.random随机()*window.innerWidth + 'px';
            h.style.animationDuration = (Math.random随机()*2+2)+'s';
            document.body.appendChild(h);
            setTimeout(()=>h.remove(), 5000);
        }
        function createPopup() {
            const p = document.createElement创建元素('div'‘div’);
            p.className = 'popup';
            p.textContent = '静静，我想你啦 ❤️❤️❤️';
            p.style.left = Math.random随机()*(window.innerWidth-220)+'px';
            p.style.top = Math.random()*(window.innerHeight-80)+'px';
            document.body.appendChild(p);
            setTimeout(()=>p.remove(), 3000);
        }
        setInterval(createHeart创建心形, 30);
        let cnt=0;
        setInterval(()=>{
            if(cnt<200) { createPopup(); cnt++; }
        }, 100);
    </script>
</body>
</html>
