<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静静，我想你啦 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #fff0f5;
            overflow: hidden;
            position: relative;
        }

        /* 爱心飘落动画 */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff69b4;
            transform: rotate(-45deg);
            animation: heartFall linear infinite;
            opacity: 0.8;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff69b4;
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: -10px;
        }

        @keyframes heartFall {
            0% {
                transform: rotate(-45deg) translateY(-20px);
                opacity: 1;
            }
            100% {
                transform: rotate(-45deg) translateY(100vh);
                opacity: 0;
            }
        }

        /* 弹窗样式 */
        .popup {
            position: absolute;
            width: 220px;
            height: 80px;
            background: pink;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            user-select: none;
            animation: fadeIn 0.3s ease;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff69b4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="title">✨ 静静，我想你啦 ✨</div>

    <script>
        // 生成爱心
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const x = Math.random() * window.innerWidth;
            const size = Math.random() * 10 + 10;
            heart.style.left = `${x}px`;
            heart.style.top = `-20px`;
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;
            heart.style.animationDuration = `${Math.random() * 3 + 2}s`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        // 生成弹窗
        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.textContent = '静静，我想你啦 ❤️❤️❤️';
            const x = Math.random() * (window.innerWidth - 220);
            const y = Math.random() * (window.innerHeight - 80);
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
        }

        // 启动效果
        function startRomance() {
            setInterval(createHeart, 30);
            let count = 0;
            const interval = setInterval(() => {
                createPopup();
                if (++count >= 200) clearInterval(interval);
            }, 100);
        }

        window.addEventListener('load', startRomance);
        document.body.addEventListener('click', startRomance);
    </script>
</body>
</html>
