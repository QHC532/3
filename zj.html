<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静静，我想你啦</title>
<style>body{background:#fff0f5;margin:0;overflow:hidden;}
.heart{position:absolute;width:20px;height:20px;background:#ff69b4;transform:rotate(-45deg);animation:fall 3s linear infinite;}
.heart::before,.heart::after{content:'';position:absolute;width:20px;height:20px;background:#ff69b4;border-radius:50%;}
.heart::before{top:-10px;}
.heart::after{left:-10px;}
@keyframes fall{0%{transform:rotate(-45deg) translateY(-20px);opacity:1;}100%{transform:rotate(-45deg) translateY(100vh);opacity:0;}}
.popup{position:absolute;width:200px;height:60px;background:pink;border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 10px #ff9ecc;animation:pop 0.5s;z-index:10;}
@keyframes pop{from{scale:0;}to{scale:1;}}
.title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#ff69b4;text-shadow:2px 2px 5px #ffc2e2;}</style>
</head>
<body>
<div class="title">✨静静，我想你啦✨</div>
<script>
// 生成爱心
setInterval(()=>{
  const h=document.createElement('div');h.className='heart';
  h.style.left=Math.random()*window.innerWidth+'px';
  h.style.animationDuration=(2+Math.random()*3)+'s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},50);

// 生成弹窗
let i=0;
const timer=setInterval(()=>{
  if(i>100){clearInterval(timer);return;}
  const p=document.createElement('div');p.className='popup';
  p.textContent='静静，我想你啦❤️';
  p.style.left=Math.random()*(window.innerWidth-200)+'px';
  p.style.top=Math.random()*(window.innerHeight-60)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),2000);
  i++;
},200);
</script>
</body>
</html>
